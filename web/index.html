<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>loom-viewer</title>
    <style>
      :root {
        --bg-top: #14101c;
        --bg-bot: #221a28;
        --ink: #f2ead8;
        --ink-soft: #d8cfbb;
        --ink-muted: #8a8172;
        --warm: #f6c87a;
        --amber: #f2a850;
        --health-good: #7fd19b;
        --health-bad: #7a7180;
      }
      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: radial-gradient(ellipse at top, var(--bg-top), var(--bg-bot));
        color: var(--ink);
        font-family:
          "Iowan Old Style", "Hoefler Text", "Palatino Linotype", Palatino, Georgia, serif;
        overflow: hidden;
      }
      canvas {
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
        display: block;
      }
      .hud {
        position: fixed;
        padding: 14px 20px;
        font-size: 13px;
        letter-spacing: 0.02em;
        color: var(--ink-soft);
        pointer-events: none;
        z-index: 2;
      }
      .hud.top-left {
        top: 0;
        left: 0;
      }
      .hud.top-right {
        top: 0;
        right: 0;
        text-align: right;
      }
      .hud.bottom {
        bottom: 0;
        left: 0;
        right: 0;
        text-align: center;
        padding: 16px 20px 20px;
        font-size: 13px;
        color: var(--ink-muted);
        font-style: italic;
      }
      .hud .count {
        color: var(--ink);
        font-size: 14px;
      }
      .hud .label {
        color: var(--ink-muted);
        margin-left: 6px;
      }
      .dot {
        display: inline-block;
        width: 7px;
        height: 7px;
        border-radius: 50%;
        margin-right: 6px;
        vertical-align: middle;
        background: var(--health-bad);
        transition: background 400ms ease;
      }
      .dot.alive {
        background: var(--health-good);
        box-shadow: 0 0 6px rgba(127, 209, 155, 0.5);
      }
      .tooltip {
        position: fixed;
        max-width: 340px;
        padding: 10px 14px;
        background: rgba(20, 16, 28, 0.94);
        border: 1px solid rgba(242, 234, 216, 0.15);
        border-radius: 8px;
        font-size: 12.5px;
        line-height: 1.45;
        color: var(--ink);
        pointer-events: none;
        z-index: 3;
        opacity: 0;
        transition: opacity 120ms ease;
        box-shadow: 0 6px 24px rgba(0, 0, 0, 0.4);
      }
      .tooltip.visible {
        opacity: 1;
      }
      .tooltip .head {
        color: var(--warm);
        font-weight: 500;
        margin-bottom: 4px;
      }
      .tooltip .meta {
        color: var(--ink-muted);
        font-size: 11px;
        margin-top: 4px;
      }
      .drawer {
        position: fixed;
        top: 0;
        right: 0;
        bottom: 0;
        width: 360px;
        background: rgba(20, 16, 28, 0.97);
        border-left: 1px solid rgba(242, 234, 216, 0.1);
        padding: 28px 24px;
        overflow-y: auto;
        transform: translateX(100%);
        transition: transform 220ms cubic-bezier(0.2, 0.9, 0.3, 1);
        z-index: 4;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        font-size: 13px;
        line-height: 1.55;
      }
      .drawer.open {
        transform: translateX(0);
      }
      .drawer h3 {
        margin: 0 0 4px;
        color: var(--warm);
        font-weight: 500;
        font-size: 15px;
      }
      .drawer .sub {
        color: var(--ink-muted);
        font-size: 11px;
        margin-bottom: 18px;
      }
      .drawer section {
        margin-bottom: 18px;
      }
      .drawer section h4 {
        margin: 0 0 6px;
        font-size: 11px;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--ink-muted);
        font-weight: 500;
      }
      .drawer .body {
        color: var(--ink-soft);
        white-space: pre-wrap;
        word-wrap: break-word;
      }
      .drawer .log-entry {
        padding: 4px 0;
        border-top: 1px solid rgba(242, 234, 216, 0.06);
        color: var(--ink-soft);
      }
      .drawer .log-entry:first-child {
        border-top: 0;
      }
      .drawer .close {
        position: absolute;
        top: 14px;
        right: 16px;
        background: transparent;
        border: 0;
        color: var(--ink-muted);
        font-size: 18px;
        cursor: pointer;
        padding: 4px 8px;
      }
      .whisper {
        position: fixed;
        left: 20px;
        bottom: 46px;
        padding: 12px 18px;
        background: linear-gradient(90deg, rgba(246, 200, 122, 0.16), rgba(246, 200, 122, 0.04));
        border-left: 2px solid var(--warm);
        color: var(--ink);
        font-size: 14px;
        letter-spacing: 0.01em;
        border-radius: 4px;
        opacity: 0;
        transform: translateY(8px);
        transition: opacity 320ms ease, transform 320ms ease;
        pointer-events: none;
        z-index: 3;
        max-width: 520px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
      }
      .whisper.visible {
        opacity: 1;
        transform: translateY(0);
      }
    </style>
  </head>
  <body>
    <canvas id="loom"></canvas>
    <div class="hud top-left">
      <span class="count" id="taken-count">—</span><span class="label" id="taken-label"
      >taken care of</span>
    </div>
    <div class="hud top-right">
      <span class="dot" id="health-dot"></span><span id="health-label">connecting…</span>
    </div>
    <div class="hud bottom" id="micro-summary"></div>
    <div class="tooltip" id="tooltip"></div>
    <div class="whisper" id="whisper"></div>
    <aside class="drawer" id="drawer">
      <button class="close" id="drawer-close">×</button>
      <div id="drawer-body"></div>
    </aside>
    <script type="module" src="/client.js"></script>
  </body>
</html>
